name: Update KSA Athlete Profiles

on:
  schedule:
    # Run daily at 3 AM UTC (before main v2 scraper at 4 AM)
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  update-profiles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r world_athletics_v2/requirements.txt
          pip install requests playwright

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Detect API credentials
        id: detect-key
        env:
          WA_API_KEY: ${{ secrets.WA_API_KEY }}
        run: |
          cd world_athletics_v2
          python -c "
          import os, sys
          sys.path.insert(0, '.')
          from api.key_updater import test_credentials, detect_credentials
          from api.wa_client import _DEFAULT_URL

          key = os.environ.get('WA_API_KEY', '')
          url = _DEFAULT_URL

          if key and test_credentials(url, key):
              print(f'Secret key valid')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'WA_GRAPHQL_URL={url}\n')
                  f.write(f'WA_API_KEY={key}\n')
              sys.exit(0)

          print('Auto-detecting credentials...')
          creds = detect_credentials()
          if creds and test_credentials(creds['url'], creds['key']):
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'WA_GRAPHQL_URL={creds[\"url\"]}\n')
                  f.write(f'WA_API_KEY={creds[\"key\"]}\n')
          else:
              print('ERROR: Could not obtain valid credentials')
              sys.exit(1)
          "

      - name: Scrape KSA athlete profiles
        env:
          WA_API_KEY: ${{ steps.detect-key.outputs.WA_API_KEY }}
          WA_GRAPHQL_URL: ${{ steps.detect-key.outputs.WA_GRAPHQL_URL }}
        run: |
          cd world_athletics_v2
          python -u -c "
          import asyncio, platform, sys, json
          sys.path.insert(0, '.')
          from scrapers.scrape_athletes import scrape_ksa_athletes
          from scrapers.scrape_athletes import profiles_to_dataframe, pbs_to_dataframe, results_to_dataframe, save_parquet
          from scrapers.scrape_rankings import extract_rankings_from_profiles
          from api.wa_client import WAClient
          import pandas as pd
          from pathlib import Path

          OUTPUT_DIR = Path('data/scraped')
          OUTPUT_DIR.mkdir(parents=True, exist_ok=True)

          async def main():
              async with WAClient(max_per_second=3.0) as client:
                  profiles = await scrape_ksa_athletes(client, 'KSA')
                  if not profiles:
                      print('ERROR: No profiles scraped')
                      return

                  save_parquet(profiles_to_dataframe(profiles), 'ksa_athletes.parquet')
                  save_parquet(pbs_to_dataframe(profiles), 'ksa_personal_bests.parquet')
                  save_parquet(results_to_dataframe(profiles), 'ksa_results.parquet')

                  # Save raw JSON
                  json_path = OUTPUT_DIR / 'ksa_deep_profiles.json'
                  with open(json_path, 'w', encoding='utf-8') as f:
                      json.dump(profiles, f, ensure_ascii=False, indent=2, default=str)

                  # Update men's rankings from KSA profiles
                  df_ksa_ranks = extract_rankings_from_profiles(profiles, source_label='ksa_profile')
                  mens_path = OUTPUT_DIR / 'mens_rankings.parquet'
                  if mens_path.exists():
                      df_existing = pd.read_parquet(mens_path)
                      df_existing = df_existing[df_existing['source'] != 'ksa_profile']
                      df_combined = pd.concat([df_ksa_ranks[df_ksa_ranks['gender'] == 'M'], df_existing], ignore_index=True)
                      df_combined = df_combined.drop_duplicates(subset=['athlete_id', 'event_slug'], keep='first')
                      df_combined = df_combined.sort_values(['event_slug', 'rank'])
                      df_combined.to_parquet(mens_path, index=False, engine='pyarrow')

                  print(f'Done: {len(profiles)} profiles scraped')

          if platform.system() == 'Windows':
              asyncio.set_event_loop_policy(asyncio.WindowsSelectorEventLoopPolicy())
          asyncio.run(main())
          "
        timeout-minutes: 30

      - name: Upload to Azure
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        continue-on-error: true
        run: |
          cd world_athletics_v2
          python -c "
          from scrapers.pipeline import upload_to_azure
          upload_to_azure()
          "

      - name: Commit updated profiles
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add world_athletics_v2/data/scraped/ksa_*.parquet || true
          git add world_athletics_v2/data/scraped/ksa_deep_profiles.json || true
          git add world_athletics_v2/data/scraped/mens_rankings.parquet || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: KSA athlete profiles $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Summary
        run: |
          echo "## KSA Athlete Profiles Update" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          cd world_athletics_v2
          python -c "
          import pandas as pd
          from pathlib import Path

          for name in ['ksa_athletes', 'ksa_personal_bests', 'ksa_results']:
              f = Path(f'data/scraped/{name}.parquet')
              if f.exists():
                  df = pd.read_parquet(f)
                  print(f'| {name} | {len(df)} rows |')
          " >> $GITHUB_STEP_SUMMARY
