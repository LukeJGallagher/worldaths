name: Update v2 GraphQL Data

on:
  schedule:
    # Daily at 4 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      scrape_mode:
        description: 'Scrape mode: daily (rankings+profiles), weekly (full refresh), initial (deep scrape)'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - initial

env:
  PYTHON_VERSION: '3.11'

jobs:
  scrape-v2:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install v2 dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r world_athletics_v2/requirements.txt
          pip install requests playwright

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Fix DNS for World Athletics API
        run: |
          # The WA GraphQL API uses CloudFront edge domains that don't resolve
          # from GitHub Actions runners. Resolve via Google DNS and add to /etc/hosts.
          WA_HOST="graphql-prod-4864.edge.aws.worldathletics.org"

          echo "Checking DNS for ${WA_HOST}..."
          if host ${WA_HOST} > /dev/null 2>&1; then
            echo "DNS resolves natively - no fix needed"
          else
            echo "DNS fails natively - resolving via Google DNS (8.8.8.8)..."
            IP=$(dig +short ${WA_HOST} @8.8.8.8 A | head -1)
            if [ -n "$IP" ]; then
              echo "${IP} ${WA_HOST}" | sudo tee -a /etc/hosts
              echo "Added ${WA_HOST} -> ${IP} to /etc/hosts"
            else
              echo "WARNING: Could not resolve via Google DNS either"
              # Try CloudFront distribution directly
              CF_IP=$(dig +short d2bivqi363mb07.cloudfront.net @8.8.8.8 A | head -1)
              if [ -n "$CF_IP" ]; then
                echo "${CF_IP} ${WA_HOST}" | sudo tee -a /etc/hosts
                echo "Added ${WA_HOST} -> ${CF_IP} (via CloudFront) to /etc/hosts"
              fi
            fi

            # Verify fix
            python -c "
            import socket
            try:
                addrs = socket.getaddrinfo('${WA_HOST}', 443)
                print(f'DNS fix verified: {addrs[0][4][0]}')
            except Exception as e:
                print(f'DNS still failing: {e}')
                exit(1)
            "
          fi

      - name: Detect and validate API credentials
        id: detect-key
        env:
          WA_API_KEY: ${{ secrets.WA_API_KEY }}
        run: |
          cd world_athletics_v2
          python -u -c "
          import os, sys
          sys.path.insert(0, '.')
          from api.key_updater import test_credentials, detect_credentials
          from api.wa_client import _DEFAULT_URL

          key = os.environ.get('WA_API_KEY', '')
          url = _DEFAULT_URL

          print(f'Default URL: {url}')
          print(f'Secret key set: {bool(key)}')

          # Try secret key + hardcoded URL first
          if key:
              try:
                  if test_credentials(url, key):
                      print(f'GitHub Secret key valid at: {url.split(\"/\")[-2]}')
                      with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                          f.write(f'WA_GRAPHQL_URL={url}\n')
                          f.write(f'WA_API_KEY={key}\n')
                          f.write('key_source=secret\n')
                      sys.exit(0)
                  else:
                      print('Secret key failed validation')
              except Exception as e:
                  print(f'Secret key test error: {e}')

          # Auto-detect new credentials via Playwright
          print('Auto-detecting credentials via Playwright...')
          creds = detect_credentials(timeout_ms=30000)
          if not creds:
              print('ERROR: Failed to detect API credentials')
              sys.exit(1)

          print(f'Detected URL: {creds[\"url\"]}')
          print(f'Detected key: {creds[\"key\"][:12]}...')

          if not test_credentials(creds['url'], creds['key']):
              print('ERROR: Detected credentials failed validation')
              sys.exit(1)

          print(f'Credentials validated OK')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'WA_GRAPHQL_URL={creds[\"url\"]}\n')
              f.write(f'WA_API_KEY={creds[\"key\"]}\n')
              f.write('key_source=auto-detected\n')
          "
        timeout-minutes: 5

      - name: Fix DNS for detected endpoint
        env:
          WA_GRAPHQL_URL: ${{ steps.detect-key.outputs.WA_GRAPHQL_URL }}
        run: |
          # If Playwright detected a different endpoint, fix DNS for that too
          DETECTED_HOST=$(python -c "from urllib.parse import urlparse; print(urlparse('${WA_GRAPHQL_URL}').hostname)")
          echo "Detected endpoint host: ${DETECTED_HOST}"

          if ! host ${DETECTED_HOST} > /dev/null 2>&1; then
            echo "DNS fails for detected host - resolving via Google DNS..."
            IP=$(dig +short ${DETECTED_HOST} @8.8.8.8 A | head -1)
            if [ -n "$IP" ]; then
              echo "${IP} ${DETECTED_HOST}" | sudo tee -a /etc/hosts
              echo "Added ${DETECTED_HOST} -> ${IP} to /etc/hosts"
            fi
          else
            echo "DNS OK for ${DETECTED_HOST}"
          fi

      - name: Run v2 scraper pipeline
        env:
          WA_API_KEY: ${{ steps.detect-key.outputs.WA_API_KEY }}
          WA_GRAPHQL_URL: ${{ steps.detect-key.outputs.WA_GRAPHQL_URL }}
        run: |
          cd world_athletics_v2
          MODE=${{ github.event.inputs.scrape_mode || 'daily' }}
          echo "Running v2 scraper in ${MODE} mode..."
          echo "API endpoint: ${WA_GRAPHQL_URL}"
          echo "API key length: ${#WA_API_KEY}"
          python -u -m scrapers.pipeline --${MODE}
        timeout-minutes: 45

      - name: Upload scraped data to Azure Blob Storage
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          cd world_athletics_v2
          python -c "
          from scrapers.pipeline import upload_to_azure
          upload_to_azure()
          "
        continue-on-error: true

      - name: Validate scraped data
        run: |
          cd world_athletics_v2
          python -c "
          import pandas as pd
          from pathlib import Path

          data_dir = Path('data/scraped')
          files = list(data_dir.glob('*.parquet'))
          print(f'Parquet files: {len(files)}')

          for f in sorted(files):
              try:
                  df = pd.read_parquet(f)
                  print(f'  {f.name}: {len(df)} rows, {len(df.columns)} cols')
              except Exception as e:
                  print(f'  {f.name}: ERROR - {e}')

          # Validate minimum data
          athletes = data_dir / 'ksa_athletes.parquet'
          if athletes.exists():
              df = pd.read_parquet(athletes)
              assert len(df) >= 10, f'Too few athletes: {len(df)}'
              print(f'Validation PASSED: {len(df)} athletes')
          else:
              print('WARNING: ksa_athletes.parquet not found')
          "

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add only parquet data files (not .env or secrets!)
          git add world_athletics_v2/data/scraped/*.parquet || true
          git add world_athletics_v2/data/scraped/*.json || true

          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            MODE=${{ github.event.inputs.scrape_mode || 'daily' }}
            KEY_SOURCE=${{ steps.detect-key.outputs.key_source }}
            git commit -m "Auto-update: v2 ${MODE} data refresh $(date +'%Y-%m-%d') [key: ${KEY_SOURCE}]"
            git push
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v2-scraped-data-${{ github.run_number }}
          path: world_athletics_v2/data/scraped/*.parquet
          retention-days: 14
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          MODE=${{ github.event.inputs.scrape_mode || 'daily' }}
          KEY_SOURCE=${{ steps.detect-key.outputs.key_source }}
          echo "## v2 GraphQL Data Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${MODE}" >> $GITHUB_STEP_SUMMARY
          echo "**API Key Source:** ${KEY_SOURCE}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          cd world_athletics_v2
          python -c "
          import pandas as pd
          from pathlib import Path

          data_dir = Path('data/scraped')
          print('| File | Rows | Cols |')
          print('|------|------|------|')
          for f in sorted(data_dir.glob('*.parquet')):
              try:
                  df = pd.read_parquet(f)
                  print(f'| {f.name} | {len(df)} | {len(df.columns)} |')
              except:
                  print(f'| {f.name} | ERROR | - |')
          " >> $GITHUB_STEP_SUMMARY
